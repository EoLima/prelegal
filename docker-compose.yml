services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - prelegal-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=8000
      - JWT_SECRET=${JWT_SECRET:-prelegal-dev-secret-change-in-production}
      - DB_PATH=data/prelegal.db
      - OPENCODE_GO_API_KEY=${OPENCODE_GO_API_KEY}

volumes:
  prelegal-data:
